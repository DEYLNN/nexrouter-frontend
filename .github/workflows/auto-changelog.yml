name: Auto Changelog & Version Bump

on:
  push:
    branches: [main]
    paths-ignore:
      - "CHANGELOG.md"
      - "package.json"

permissions:
  contents: write

jobs:
  changelog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate changelog entry + bump version
        run: python3 .github/scripts/auto_changelog.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md package.json
          git diff --cached --quiet || git commit -m "chore: auto-update changelog"
          git push
